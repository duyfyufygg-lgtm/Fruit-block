<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Rex Fruit - ADMIN POSSESS EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Tahoma', sans-serif; user-select: none; touch-action: none; }
        
        /* UI พื้นฐาน */
        #loading-screen { position: absolute; width:100%; height:100%; background:#111; display:flex; align-items:center; justify-content:center; z-index:9999; color:white; flex-direction: column; }
        .login-box { background: rgba(0,0,0,0.9); padding: 40px; border-radius: 15px; border: 3px solid #ffd700; text-align: center; box-shadow: 0 0 30px #ffd700; }
        input#user-id { padding: 12px; font-size: 16px; border-radius: 8px; border: none; margin: 15px 0; width: 220px; text-align: center; background:#222; color:white; border: 1px solid #444; }
        .start-btn { background: #ffd700; color: #000; padding: 12px 40px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; width: 100%; }

        #game-ui { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .pointer { pointer-events: auto; }

        /* Status & Admin Panel */
        #stat-panel { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 8px; border-left: 4px solid #00d4ff; backdrop-filter: blur(5px); min-width: 150px; }
        #admin-tools { position: absolute; top: 90px; left: 10px; display: none; flex-direction: column; gap: 5px; }
        .adm-btn { background: #ff00ff; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold; box-shadow: 0 3px 0 #800080; }
        .adm-btn.active { background: #ff4500; box-shadow: 0 0 10px #ff4500; }

        /* Hotbar & Weapons */
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; pointer-events: auto; }
        .slot { width: 55px; height: 55px; background: rgba(0,0,0,0.8); border: 2px solid #444; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; cursor: pointer; }
        .slot.active { border-color: #ffd700; background: rgba(255,215,0,0.3); box-shadow: 0 0 15px #ffd700; }

        /* Controls */
        #joy-base { position: absolute; bottom: 40px; right: 130px; width: 85px; height: 85px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }
        #joy-stick { position: absolute; top: 22px; left: 22px; width: 40px; height: 40px; background: white; border-radius: 50%; opacity: 0.4; }
        #atk-btn { position: absolute; bottom: 35px; right: 25px; width: 80px; height: 80px; background: rgba(255,0,0,0.5); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; pointer-events: auto; font-size: 18px; }

        .adm-glow { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; animation: glow 1s infinite alternate; font-weight: bold; }
        @keyframes glow { from { opacity: 0.6; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="login-box">
            <h1 style="color:#ffd700; margin:0;">🦖 T-REX FRUIT</h1>
            <p style="color:#777; font-size:10px;">ADMIN POSSESS SYSTEM ACTIVE</p>
            <input type="text" id="user-id" placeholder="ใส่ชื่อ ID...">
            <br>
            <button class="start-btn" onclick="enterGame()">LOGIN</button>
        </div>
    </div>

    <div id="game-ui">
        <div id="stat-panel" class="pointer">
            <div id="display-id">...</div>
            <div style="color:#0f0;">💰 ฿ <span id="money">0</span></div>
            <div id="my-title" style="font-size:9px; color:#ffd700;">TITLE: Beginner</div>
        </div>

        <div id="admin-tools" class="pointer">
            <button class="adm-btn" onclick="addMoney()">เสกเงิน ฿100,000</button>
            <button class="adm-btn" id="possess-btn" onclick="togglePossess()">สิงร่างผู้เล่น</button>
            <button class="adm-btn" onclick="giveAxeToPlayer()">ประทานขวาน (Give)</button>
        </div>

        <div id="hotbar">
            <div class="slot active" id="slot-combat" onclick="selectWeapon('combat')">Combat</div>
            <div class="slot" id="slot-axe" style="display:none;" onclick="selectWeapon('axe')">Axe (ขวาน)</div>
        </div>

        <div id="joy-base" class="pointer"><div id="joy-stick"></div></div>
        <div id="atk-btn" class="pointer">ATK</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const DB_URL = "https://the-herta-cf467-default-rtdb.asia-southeast1.firebasedatabase.app/";
        let currentUser = "", isAdmin = false, currentWeapon = "combat";
        let gameData = { money: 0, bounty: 1000, hasFruit: false, fruitType: "none" };
        let scene, camera, renderer, player, models = {}, moveDir = new THREE.Vector3();
        let loader = new GLTFLoader(), enemies = [], camX = 0, isTouch = false, lastX;
        
        // Possess Variables
        let isPossessing = false, targetID = "", targetData = null;

        window.enterGame = async () => {
            const id = document.getElementById('user-id').value.trim();
            if(!id) return;
            currentUser = id;
            isAdmin = (id === "The Herta");

            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('display-id').innerText = currentUser;

            if(isAdmin) {
                document.getElementById('admin-tools').style.display = 'flex';
                document.getElementById('display-id').classList.add('adm-glow');
                gameData.hasFruit = true; gameData.fruitType = "axe";
                gameData.bounty = 999999999;
            }
            init();
            updateUI();
        };

        // --- ระบบสิงร่าง (The Ghost Admin) ---
        window.togglePossess = () => {
            if (!isPossessing) {
                const id = prompt("ระบุ ID ผู้เล่นที่ต้องการสิงร่าง:");
                if (id && id !== currentUser) {
                    targetID = id;
                    isPossessing = true;
                    document.getElementById('possess-btn').innerText = "ยกเลิกการสิง";
                    document.getElementById('possess-btn').classList.add('active');
                }
            } else {
                isPossessing = false;
                targetID = "";
                targetData = null;
                document.getElementById('possess-btn').innerText = "สิงร่างผู้เล่น";
                document.getElementById('possess-btn').classList.remove('active');
            }
        };

        // ดึงตำแหน่งผู้เล่นอื่น (จำลองระบบ Multiplayer)
        setInterval(async () => {
            if (isPossessing && targetID) {
                const res = await fetch(`${DB_URL}positions/${targetID}.json`);
                targetData = await res.json();
            }
            // อัปเดตตำแหน่งตัวเองขึ้น DB
            if (currentUser) {
                fetch(`${DB_URL}positions/${currentUser}.json`, {
                    method: 'PUT',
                    body: JSON.stringify({ x: player.position.x, y: player.position.y, z: player.position.z, rot: player.rotation.y })
                });
            }
        }, 500);

        window.selectWeapon = (wp) => {
            currentWeapon = wp;
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            document.getElementById(`slot-${wp}`).classList.add('active');
            if(models.axe) models.axe.visible = (wp === 'axe');
        };

        window.addMoney = () => { gameData.money += 100000; updateUI(); };

        function updateUI() {
            document.getElementById('money').innerText = gameData.money.toLocaleString();
            if(gameData.hasFruit) document.getElementById('slot-axe').style.display = 'flex';
        }

        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8), new THREE.DirectionalLight(0xffffff, 1));
            
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({color: 0x2e7d32}));
            ground.rotation.x = -Math.PI/2; scene.add(ground);

            player = new THREE.Group(); scene.add(player);
            loader.load('bin.glb', g => { models.human = g.scene; player.add(models.human); });
            loader.load('axe.glb', g => { 
                models.axe = g.scene; models.axe.visible = false; 
                models.axe.scale.set(6,6,6); models.axe.position.set(2,4,0); 
                player.add(models.axe); 
                if(isAdmin) selectWeapon('axe');
            });

            // NPC (bin.glb)
            loader.load('bin.glb', g => {
                const npc = g.scene; npc.position.set(30, 0, -30);
                npc.scale.set(3,3,3); scene.add(npc);
            });

            // Monster (fae.glb)
            for(let i=0; i<10; i++) {
                loader.load('fae.glb', g => {
                    const m = g.scene;
                    m.position.set(Math.random()*250-125, 2, Math.random()*250-125);
                    m.scale.set(5,5,5); scene.add(m);
                    enemies.push({ obj: m, hp: 100 });
                });
            }
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            if (isPossessing && targetData) {
                // โหมดสิงร่าง: ตัวละครเราจะวาร์ปไปหาเป้าหมาย
                player.position.lerp(new THREE.Vector3(targetData.x, targetData.y, targetData.z), 0.1);
                player.rotation.y = targetData.rot;
            } else if (moveDir.length() > 0.1) {
                const forward = new THREE.Vector3(Math.sin(camX+Math.PI), 0, Math.cos(camX+Math.PI));
                const right = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), forward);
                const move = forward.multiplyScalar(-moveDir.z).add(right.multiplyScalar(moveDir.x));
                player.position.add(move.multiplyScalar(isAdmin ? 1.2 : 0.5));
                player.rotation.y = Math.atan2(move.x, move.z);
            }

            camera.position.set(player.position.x + Math.sin(camX)*35, player.position.y + 20, player.position.z + Math.cos(camX)*35);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }

        document.getElementById('atk-btn').addEventListener('click', () => {
            let dmg = (currentWeapon === 'axe') ? (isAdmin ? 999999 : 60) : 20;
            enemies.forEach(en => {
                if(player.position.distanceTo(en.obj.position) < 15) {
                    en.hp -= dmg;
                    if(en.hp <= 0) {
                        en.obj.position.set(Math.random()*250-125, 2, Math.random()*250-125);
                        en.hp = 100; gameData.money += 5000; updateUI();
                    }
                }
            });
        });

        // Controls
        let joyActive = false;
        document.getElementById('joy-base').addEventListener('pointerdown', ()=> joyActive=true);
        window.addEventListener('pointermove', e => {
            if(!joyActive) return;
            const rect = document.getElementById('joy-base').getBoundingClientRect();
            const x = e.clientX-rect.left-42, y = e.clientY-rect.top-42;
            const dist = Math.min(Math.sqrt(x*x+y*y), 35);
            const ang = Math.atan2(y, x);
            document.getElementById('joy-stick').style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;
            moveDir.set(Math.cos(ang), 0, Math.sin(ang));
        });
        window.addEventListener('pointerup', ()=>{ joyActive=false; moveDir.set(0,0,0); document.getElementById('joy-stick').style.transform="translate(0,0)"; });
        window.addEventListener('pointerdown', e => { if(e.clientX > window.innerWidth/2) { isTouch=true; lastX=e.clientX; }});
        window.addEventListener('pointermove', e => { if(isTouch) { camX -= (e.clientX - lastX) * 0.01; lastX=e.clientX; }});
        window.addEventListener('pointerup', () => isTouch=false);
    </script>
</body>
    </html>
