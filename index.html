<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Rex PVP Online - Camera Follow</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; user-select: none; touch-action: none; }
        #loading-screen { position: absolute; width:100%; height:100%; background:#111; display:flex; align-items:center; justify-content:center; z-index:9999; color:white; }
        .login-box { background: rgba(0,0,0,0.9); padding: 30px; border-radius: 15px; border: 3px solid #ffd700; text-align: center; }
        input { padding: 12px; font-size: 18px; border-radius: 5px; border: none; margin: 10px 0; width: 220px; text-align: center; background:#333; color:white; }
        .start-btn { background: #ffd700; color: black; padding: 12px 35px; font-size: 20px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        
        #game-ui { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .pointer { pointer-events: auto; }
        #stat-panel { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: white; padding: 12px; border-radius: 10px; border: 2px solid #00d4ff; font-size: 14px; }
        #inv-panel { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: white; padding: 12px; border-radius: 10px; border: 2px solid #ffd700; width: 150px; text-align: center; }
        
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; }
        #joy-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: white; border-radius: 50%; opacity: 0.6; }
        #actions { position: absolute; bottom: 40px; right: 30px; display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
        .btn-circle { width: 80px; height: 80px; background: rgba(255,255,255,0.3); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        #atk-btn { width: 110px; height: 110px; background: rgba(255,0,0,0.5); }
        
        .bar-bg { width: 100%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        #hp-fill { height: 100%; background: #ff3333; width: 100%; transition: 0.2s; }
        #msg { position: absolute; top: 20%; width: 100%; text-align: center; color: #fff; font-weight: bold; font-size: 22px; pointer-events: none; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="login-box">
            <h1>🦖 T-REX WORLD PVP</h1>
            <input type="text" id="user-id" placeholder="ID ของคุณ..." maxlength="10"><br>
            <button class="start-btn" onclick="login()">เข้าสู่เกม</button>
        </div>
    </div>

    <div id="game-ui">
        <div id="stat-panel" class="pointer">
            <div style="color: #ffd700; font-weight: bold;">👤 ID: <span id="display-id">...</span></div>
            <div class="bar-bg" style="height:15px;"><div id="hp-fill"></div></div>
            <div style="font-size:10px; text-align:center;">HP: <span id="hp-text">100</span> / <span id="max-hp">100</span></div>
            <hr>
            <div>💰 เงิน: <span id="money">0</span> | ✨ Pts: <span id="pts">0</span></div>
            <div>🥊 หมัด: <b id="v-melee">1</b> <button onclick="upStat('melee')">+</button></div>
            <div>🦖 ผล: <b id="v-fruit">1</b> <button onclick="upStat('fruit')">+</button></div>
        </div>

        <div id="inv-panel" class="pointer">
            <div id="shop-part"><button onclick="buyFruit()" style="width:100%; padding:10px;">ซื้อผล (100฿)</button></div>
            <div id="item-part" style="display:none;">
                <button id="equip-btn" onclick="equipFruit()" style="width:100%;">สวมใส่ผล</button>
                <div class="bar-bg"><div id="m-fill" style="height:100%; background:#00ff00; width:0%;"></div></div>
                <small>Mastery: <span id="m-val">0</span>/5</small>
            </div>
        </div>

        <div id="msg"></div>
        <div id="joy-base" class="pointer"><div id="joy-stick"></div></div>
        <div id="actions" class="pointer">
            <div class="btn-circle" id="atk-btn">ATTACK</div>
            <div class="btn-circle" id="jump-btn">JUMP</div>
            <div class="btn-circle" id="trans-btn" style="display:none; background:#ffaa00;">TRANS</div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const DB_URL = "https://the-herta-cf467-default-rtdb.asia-southeast1.firebasedatabase.app/";
        let currentUser = "", gameData = { money: 0, pts: 0, melee: 1, fruit: 1, hp: 100, maxHp: 100, hasFruit: false, isEquipped: false, mastery: 0 };
        let scene, camera, renderer, player, human, trex, moveDir = new THREE.Vector3(), vY = 0, isTrex = false, isAttacking = false, otherPlayers = {};
        const loader = new GLTFLoader();

        window.login = async () => {
            const id = document.getElementById('user-id').value.trim();
            if(!id) return alert("ใส่ชื่อ ID");
            currentUser = id;
            try {
                const res = await fetch(`${DB_URL}users/${id}.json`);
                const data = await res.json();
                if(data) gameData = data; else await save();
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                document.getElementById('display-id').innerText = currentUser;
                init();
                startNetwork();
            } catch(e) { alert("เชื่อมต่อ Server ไม่ได้!"); }
        };

        async function save() { fetch(`${DB_URL}users/${currentUser}.json`, { method: 'PUT', body: JSON.stringify(gameData) }); }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7), new THREE.DirectionalLight(0xffffff, 1));
            const ground = new THREE.Mesh(new THREE.CylinderGeometry(50, 50, 2, 32), new THREE.MeshStandardMaterial({color: 0x228B22}));
            scene.add(ground);

            player = new THREE.Group(); scene.add(player);
            loader.load('bin.glb', g => { human = g.scene; player.add(human); });
            loader.load('T-Rex.glb', g => { 
                trex = g.scene; trex.visible = false; 
                trex.rotation.y = Math.PI; // แก้กลับหลัง
                player.add(trex); 
            });

            updateUI();
            animate();
        }

        function startNetwork() {
            setInterval(() => { // Sync ตำแหน่งตัวเอง
                if(!player) return;
                fetch(`${DB_URL}presence/${currentUser}.json`, {
                    method: 'PUT',
                    body: JSON.stringify({ x: player.position.x, y: player.position.y, z: player.position.z, ry: player.rotation.y, isTrex: isTrex, fl: gameData.fruit, hp: gameData.hp })
                });
            }, 100);

            setInterval(async () => { // โหลดข้อมูลเพื่อน
                const res = await fetch(`${DB_URL}presence.json`);
                const all = await res.json();
                if(!all) return;
                
                // อัปเดตเลือดเรากรณีโดนตบ
                if(all[currentUser]) {
                    gameData.hp = all[currentUser].hp;
                    if(gameData.hp <= 0) { gameData.hp = 100; player.position.set(0,5,0); save(); }
                    updateUI();
                }

                Object.keys(all).forEach(id => {
                    if(id === currentUser) return;
                    if(!otherPlayers[id]) {
                        const g = new THREE.Group();
                        loader.load('bin.glb', m => { m.scene.name="h"; g.add(m.scene); });
                        loader.load('T-Rex.glb', m => { m.scene.name="t"; m.scene.rotation.y=Math.PI; m.scene.visible=false; g.add(m.scene); });
                        scene.add(g); otherPlayers[id] = g;
                    }
                    const d = all[id], p = otherPlayers[id];
                    p.position.set(d.x, d.y, d.z); p.rotation.y = d.ry;
                    const h = p.getObjectByName("h"), t = p.getObjectByName("t");
                    if(h && t) {
                        h.visible = !d.isTrex; t.visible = d.isTrex;
                        if(d.isTrex) { const s = 4.5 + (d.fl*0.5); t.scale.set(s,s,s); }
                    }
                });
            }, 300);
        }

        // --- Camera Logic (สัมพันธ์กับตัวละคร) ---
        function updateCamera() {
            if(!player) return;
            // ตั้งค่าตำแหน่งกล้องให้เยื้องไปข้างหลังและข้างบนตัวละคร
            const offset = new THREE.Vector3(0, isTrex ? 12 : 7, isTrex ? 20 : 12); 
            offset.applyQuaternion(player.quaternion); // หมุนตามตัวละคร
            
            const targetPos = player.position.clone().add(offset);
            camera.position.lerp(targetPos, 0.1); // เคลื่อนตามนุ่มนวล
            
            // ให้กล้องมองไปที่ตัวละคร (ปรับจุดโฟกัสให้สูงขึ้นถ้าเป็น T-Rex)
            const lookAtPos = player.position.clone().add(new THREE.Vector3(0, isTrex ? 4 : 2, 0));
            camera.lookAt(lookAtPos);
        }

        // --- Logic เกมอื่นๆ ---
        window.upStat = (s) => { if(gameData.pts > 0) { gameData.pts--; if(s=='melee') gameData.melee++; if(s=='fruit') gameData.fruit++; updateUI(); save(); } };
        window.buyFruit = () => { if(gameData.money >= 100) { gameData.money -= 100; gameData.hasFruit = true; updateUI(); save(); } };
        window.equipFruit = () => { gameData.isEquipped = true; updateUI(); save(); };

        function updateUI() {
            document.getElementById('money').innerText = gameData.money;
            document.getElementById('pts').innerText = gameData.pts;
            document.getElementById('v-melee').innerText = gameData.melee;
            document.getElementById('v-fruit').innerText = gameData.fruit;
            document.getElementById('hp-text').innerText = Math.floor(gameData.hp);
            document.getElementById('hp-fill').style.width = (gameData.hp/gameData.maxHp*100)+'%';
            document.getElementById('m-fill').style.width = (gameData.mastery/5*100)+'%';
            document.getElementById('m-val').innerText = gameData.mastery;
            if(gameData.hasFruit) { document.getElementById('shop-part').style.display='none'; document.getElementById('item-part').style.display='block'; }
            if(gameData.isEquipped) { document.getElementById('equip-btn').innerText="สวมใส่แล้ว"; document.getElementById('equip-btn').disabled=true; }
            if(gameData.mastery >= 5) document.getElementById('trans-btn').style.display='flex';
        }

        async function attack() {
            if(isAttacking) return; isAttacking = true;
            const dmg = isTrex ? (20 + gameData.fruit*5) : (10 + gameData.melee*3);
            const range = isTrex ? 10 : 5;

            // ตีเพื่อน (PVP)
            Object.keys(otherPlayers).forEach(id => {
                if(player.position.distanceTo(otherPlayers[id].position) < range) {
                    fetch(`${DB_URL}presence/${id}/hp.json`, { method: 'PUT', body: `hp - ${dmg}` }); // สั่งลดเลือดในเซิร์ฟ
                    // หมายเหตุ: ในระบบจริงควรใช้การ fetch ค่าล่าสุดมาลบ แต่เพื่อความง่ายใน Firebase ใช้ PUT ค่าใหม่ลงไป
                }
            });
            // ตีมอนสเตอร์ (จำลอง)
            gameData.money += 5; if(gameData.isEquipped && gameData.mastery < 5) gameData.mastery += 1;
            updateUI(); save();

            if(isTrex) { trex.rotation.x = 0.8; setTimeout(() => { trex.rotation.x = 0; isAttacking = false; }, 300); }
            else { human.rotation.z = 0.7; setTimeout(() => { human.rotation.z = 0; isAttacking = false; }, 200); }
        }

        // --- Controls ---
        let joyActive = false;
        document.getElementById('joy-base').addEventListener('pointerdown', ()=> joyActive=true);
        window.addEventListener('pointermove', e => {
            if(!joyActive) return;
            const rect = document.getElementById('joy-base').getBoundingClientRect();
            const x = e.clientX-rect.left-50, y = e.clientY-rect.top-50;
            const dist = Math.min(Math.sqrt(x*x+y*y), 40);
            const ang = Math.atan2(y, x);
            document.getElementById('joy-stick').style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;
            moveDir.set(Math.cos(ang), 0, Math.sin(ang)).multiplyScalar(dist/40);
        });
        window.addEventListener('pointerup', ()=>{ joyActive=false; document.getElementById('joy-stick').style.transform="translate(0,0)"; moveDir.set(0,0,0); });
        
        document.getElementById('atk-btn').addEventListener('pointerdown', attack);
        document.getElementById('jump-btn').addEventListener('pointerdown', ()=>{ if(player.position.y <= 0.1) vY = 0.35; });
        document.getElementById('trans-btn').addEventListener('pointerdown', ()=>{
            isTrex = !isTrex; human.visible = !isTrex; trex.visible = isTrex;
            const s = 5.5 + (gameData.fruit * 0.4); trex.scale.set(s,s,s);
        });

        function animate() {
            requestAnimationFrame(animate);
            if(moveDir.length() > 0.1) {
                player.position.add(moveDir.clone().multiplyScalar(0.28));
                player.rotation.y = Math.atan2(moveDir.x, moveDir.z);
            }
            player.position.y += vY;
            if(player.position.y > 0) vY -= 0.018; else { player.position.y = 0; vY = 0; }
            
            updateCamera(); // อัปเดตกล้องสัมพันธ์กับตัวละคร
            renderer.render(scene, camera);
        }
    </script>
</body>
    </html>
