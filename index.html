<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Rex Fruits - Full Version</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Tahoma', sans-serif; user-select: none; touch-action: none; }
        #loading-screen { position: absolute; width:100%; height:100%; background:#111; display:flex; align-items:center; justify-content:center; z-index:9999; color:white; flex-direction: column; }
        .login-box { background: rgba(0,0,0,0.9); padding: 30px; border-radius: 15px; border: 3px solid #ffd700; text-align: center; }
        input { padding: 12px; font-size: 18px; border-radius: 5px; border: none; margin: 10px 0; width: 220px; text-align: center; background:#333; color:white; }
        .start-btn { background: #ffd700; color: black; padding: 12px 35px; font-size: 20px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        
        #game-ui { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .pointer { pointer-events: auto; }
        
        #stat-panel { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: white; padding: 12px; border-radius: 10px; border: 2px solid #00d4ff; font-size: 14px; width: 200px; }
        #quest-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); color: white; padding: 20px; border-radius: 15px; border: 3px solid #ffd700; text-align: center; display: none; width: 280px; z-index: 100; }
        #quest-tracker { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #00ff00; padding: 10px; border-radius: 8px; display: none; font-weight: bold; }
        
        #inv-panel { position: absolute; bottom: 130px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 10px; border: 2px solid #ffd700; width: 140px; text-align: center; }
        
        .bar-bg { width: 100%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; margin-top: 5px; border: 1px solid #555; }
        #hp-fill { height: 100%; background: #ff3333; width: 100%; transition: 0.2s; }
        #exp-fill { height: 100%; background: #ffff00; width: 0%; transition: 0.2s; }
        
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; }
        #joy-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: white; border-radius: 50%; opacity: 0.6; }
        #actions { position: absolute; bottom: 40px; right: 30px; display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
        .btn-circle { width: 80px; height: 80px; background: rgba(255,255,255,0.3); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        #atk-btn { width: 110px; height: 110px; background: rgba(255,0,0,0.5); }
        
        #msg { position: absolute; top: 20%; width: 100%; text-align: center; color: #fff; font-weight: bold; font-size: 22px; pointer-events: none; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="login-box">
            <h1>🦖 T-REX FRUITS ONLINE</h1>
            <input type="text" id="user-id" placeholder="ID ของคุณ..." maxlength="10"><br>
            <button class="start-btn" onclick="login()">เริ่มการผจญภัย</button>
        </div>
    </div>

    <div id="quest-ui" class="pointer">
        <h2 style="color: #ffd700; margin-top: 0;">เควส: กำจัด Fae</h2>
        <p>กำจัดมอนสเตอร์ Fae จำนวน 3 ตัว<br>รางวัล: 500฿ และ 1,000 EXP</p>
        <button class="start-btn" onclick="acceptQuest()">ตกลง</button>
        <button onclick="document.getElementById('quest-ui').style.display='none'" style="background:none; border:none; color:grey;">ยกเลิก</button>
    </div>

    <div id="game-ui">
        <div id="stat-panel" class="pointer">
            <div style="font-weight: bold;">Lv. <span id="v-lv">1</span> <span id="display-id">...</span></div>
            <div class="bar-bg"><div id="hp-fill"></div></div>
            <div class="bar-bg" style="height: 6px;"><div id="exp-fill"></div></div>
            <hr>
            <div>💰 เงิน: <span id="money">0</span></div>
            <div>✨ Pts: <span id="pts">0</span></div>
            <div style="font-size: 12px; margin-top:5px;">
                🥊 Melee: <b id="v-melee">1</b> <button onclick="upStat('melee')">+</button><br>
                🦖 Fruit: <b id="v-fruit">1</b> <button onclick="upStat('fruit')">+</button>
            </div>
        </div>
        <div id="quest-tracker">ภารกิจ: กำจัด Fae (<span id="q-count">0</span>/3)</div>
        <div id="inv-panel" class="pointer">
            <div id="shop-part"><button onclick="buyFruit()" style="width:100%; background:#444; color:white;">ซื้อผล T-Rex</button></div>
            <div id="item-part" style="display:none;">
                <button id="equip-btn" onclick="equipFruit()" style="width:100%;">สวมใส่</button>
                <div class="bar-bg" style="height:5px;"><div id="m-fill" style="background:#00ff00; width:0%;"></div></div>
            </div>
        </div>
        <div id="msg"></div>
        <div id="joy-base" class="pointer"><div id="joy-stick"></div></div>
        <div id="actions" class="pointer">
            <div class="btn-circle" id="atk-btn">ATTACK</div>
            <div class="btn-circle" id="jump-btn">JUMP</div>
            <div class="btn-circle" id="trans-btn" style="display:none; background:#ffaa00;">TRANS</div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const DB_URL = "https://the-herta-cf467-default-rtdb.asia-southeast1.firebasedatabase.app/";
        let currentUser = "", gameData = { lv: 1, exp: 0, money: 0, pts: 0, melee: 1, fruit: 1, hp: 100, maxHp: 100, hasFruit: false, isEquipped: false, mastery: 0 };
        let scene, camera, renderer, player, human, trex, moveDir = new THREE.Vector3(), vY = 0, isTrex = false, isAttacking = false;
        let otherPlayers = {}, enemies = [], loader = new GLTFLoader();
        let currentQuest = { active: false, count: 0 };

        // --- ระบบหมุนหน้าจอ ---
        let cameraAngleX = 0, cameraAngleY = 0.3;
        let isTouching = false, lastTouchX = 0, lastTouchY = 0;

        window.login = async () => {
            const id = document.getElementById('user-id').value.trim();
            if(!id) return alert("ใส่ ID");
            currentUser = id;
            try {
                const res = await fetch(`${DB_URL}users/${id}.json`);
                const data = await res.json();
                if(data) gameData = data; else await save();
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                document.getElementById('display-id').innerText = currentUser;
                init();
                startNetwork();
            } catch(e) { alert("Server Error!"); }
        };

        async function save() { fetch(`${DB_URL}users/${currentUser}.json`, { method: 'PUT', body: JSON.stringify(gameData) }); }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.7), new THREE.DirectionalLight(0xffffff, 1));
            
            const ground = new THREE.Mesh(new THREE.CylinderGeometry(80, 80, 2, 32), new THREE.MeshStandardMaterial({color: 0x228B22}));
            scene.add(ground);

            for(let i=0; i<12; i++) {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(20, 15, 5), new THREE.MeshStandardMaterial({color: 0x555555}));
                const angle = (i / 12) * Math.PI * 2;
                wall.position.set(Math.cos(angle)*78, 5, Math.sin(angle)*78);
                wall.lookAt(0, 5, 0);
                scene.add(wall);
            }

            const npc = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 4, 16), new THREE.MeshStandardMaterial({color: 0xffff00}));
            npc.position.set(10, 2, 10);
            scene.add(npc);

            player = new THREE.Group(); scene.add(player);
            loader.load('bin.glb', g => { human = g.scene; player.add(human); });
            loader.load('T-Rex.glb', g => { trex = g.scene; trex.visible = false; trex.rotation.y = Math.PI; player.add(trex); });

            for(let i=0; i<5; i++) spawnEnemy();
            
            // Event ลากหน้าจอเพื่อหมุน
            window.addEventListener('pointerdown', e => { if(e.clientX > window.innerWidth/2) { isTouching = true; lastTouchX = e.clientX; lastTouchY = e.clientY; }});
            window.addEventListener('pointermove', e => {
                if(!isTouching) return;
                let dx = e.clientX - lastTouchX, dy = e.clientY - lastTouchY;
                cameraAngleX -= dx * 0.005;
                cameraAngleY = Math.max(0.1, Math.min(1.2, cameraAngleY + dy * 0.005));
                lastTouchX = e.clientX; lastTouchY = e.clientY;
            });
            window.addEventListener('pointerup', () => isTouching = false);

            updateUI();
            animate();
        }

        function spawnEnemy() {
            loader.load('fae.glb', g => {
                const eModel = g.scene;
                eModel.position.set(Math.random()*50-25, 0, -30 - Math.random()*20);
                eModel.scale.set(2.5, 2.5, 2.5);
                scene.add(eModel); enemies.push({ obj: eModel, hp: 60 });
            });
        }

        window.acceptQuest = () => {
            currentQuest.active = true; currentQuest.count = 0;
            document.getElementById('quest-ui').style.display = 'none';
            document.getElementById('quest-tracker').style.display = 'block';
            document.getElementById('q-count').innerText = "0";
            log("รับเควสแล้ว!");
        };

        function addExp(amount) {
            gameData.exp += amount;
            if(gameData.exp >= gameData.lv * 500) { gameData.exp=0; gameData.lv++; gameData.pts+=3; log("Level Up!"); }
            updateUI();
        }

        function updateCamera() {
            if(!player) return;
            const dist = isTrex ? 25 : 15;
            const height = isTrex ? 12 : 6;
            // คำนวณพิกัดกล้องเป็นวงกลมรอบตัวละคร
            camera.position.x = player.position.x + Math.sin(cameraAngleX) * dist;
            camera.position.z = player.position.z + Math.cos(cameraAngleX) * dist;
            camera.position.y = player.position.y + cameraAngleY * dist + height;
            camera.lookAt(player.position.x, player.position.y + (isTrex ? 5 : 2), player.position.z);
        }

        async function attack() {
            if(isAttacking) return; isAttacking = true;
            const dmg = isTrex ? (30 + gameData.fruit*5) : (15 + gameData.melee*3);
            enemies.forEach((en, i) => {
                if(player.position.distanceTo(en.obj.position) < (isTrex ? 12 : 6)) {
                    en.hp -= dmg;
                    if(en.hp <= 0) {
                        scene.remove(en.obj); enemies.splice(i, 1);
                        gameData.money += 30; addExp(100);
                        if(currentQuest.active) { currentQuest.count++; document.getElementById('q-count').innerText=currentQuest.count; if(currentQuest.count>=3){ currentQuest.active=false; gameData.money+=500; addExp(1000); document.getElementById('quest-tracker').style.display='none'; log("เควสสำเร็จ!"); }}
                        spawnEnemy();
                    }
                }
            });
            if(isTrex) { trex.rotation.x = 0.8; setTimeout(() => { trex.rotation.x = 0; isAttacking = false; }, 300); }
            else { human.rotation.z = 0.7; setTimeout(() => { human.rotation.z = 0; isAttacking = false; }, 200); }
            save();
        }

        function updateUI() {
            document.getElementById('money').innerText = gameData.money;
            document.getElementById('pts').innerText = gameData.pts;
            document.getElementById('v-lv').innerText = gameData.lv;
            document.getElementById('v-melee').innerText = gameData.melee;
            document.getElementById('v-fruit').innerText = gameData.fruit;
            document.getElementById('hp-fill').style.width = (gameData.hp/gameData.maxHp*100)+'%';
            document.getElementById('exp-fill').style.width = (gameData.exp / (gameData.lv * 500) * 100)+'%';
            document.getElementById('m-fill').style.width = (gameData.mastery/5*100)+'%';
            if(gameData.hasFruit) { document.getElementById('shop-part').style.display='none'; document.getElementById('item-part').style.display='block'; }
            if(gameData.isEquipped) { document.getElementById('equip-btn').innerText="สวมใส่แล้ว"; document.getElementById('equip-btn').disabled=true; }
            if(gameData.mastery >= 5) document.getElementById('trans-btn').style.display='flex';
        }

        function animate() {
            requestAnimationFrame(animate);
            if(moveDir.length() > 0.1) {
                // เดินตามทิศทางกล้อง
                const forward = new THREE.Vector3(Math.sin(cameraAngleX+Math.PI), 0, Math.cos(cameraAngleX+Math.PI));
                const right = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), forward);
                const move = forward.multiplyScalar(-moveDir.z).add(right.multiplyScalar(moveDir.x));
                player.position.add(move.multiplyScalar(0.35));
                player.rotation.y = Math.atan2(move.x, move.z);
            }
            player.position.y += vY;
            if(player.position.y > 0) vY -= 0.018; else { player.position.y = 0; vY = 0; }
            
            if(player.position.distanceTo(new THREE.Vector3(10, 0, 10)) < 5 && !currentQuest.active) document.getElementById('quest-ui').style.display = 'block';
            else if(player.position.distanceTo(new THREE.Vector3(10, 0, 10)) > 7) document.getElementById('quest-ui').style.display = 'none';

            updateCamera();
            renderer.render(scene, camera);
        }

        function startNetwork() {
            setInterval(() => { if(player) fetch(`${DB_URL}presence/${currentUser}.json`, { method: 'PUT', body: JSON.stringify({ x: player.position.x, y: player.position.y, z: player.position.z, ry: player.rotation.y, isTrex: isTrex, fl: gameData.fruit, hp: gameData.hp }) }); }, 150);
        }

        // Joystick
        let joyActive = false;
        document.getElementById('joy-base').addEventListener('pointerdown', ()=> joyActive=true);
        window.addEventListener('pointermove', e => {
            if(!joyActive) return;
            const rect = document.getElementById('joy-base').getBoundingClientRect();
            const x = e.clientX-rect.left-50, y = e.clientY-rect.top-50;
            const dist = Math.min(Math.sqrt(x*x+y*y), 40);
            const ang = Math.atan2(y, x);
            document.getElementById('joy-stick').style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;
            moveDir.set(Math.cos(ang), 0, Math.sin(ang));
        });
        window.addEventListener('pointerup', ()=>{ joyActive=false; document.getElementById('joy-stick').style.transform="translate(0,0)"; moveDir.set(0,0,0); });
        document.getElementById('atk-btn').addEventListener('pointerdown', attack);
        document.getElementById('jump-btn').addEventListener('pointerdown', ()=>{ if(player.position.y <= 0.1) vY = 0.4; });
        document.getElementById('trans-btn').addEventListener('pointerdown', ()=>{ isTrex = !isTrex; human.visible = !isTrex; trex.visible = isTrex; trex.scale.set(6+gameData.fruit*0.5, 6+gameData.fruit*0.5, 6+gameData.fruit*0.5); });
        window.upStat = (s) => { if(gameData.pts > 0) { gameData.pts--; gameData[s]++; updateUI(); save(); } };
        window.buyFruit = () => { if(gameData.money >= 100) { gameData.money -= 100; gameData.hasFruit = true; updateUI(); save(); } };
        window.equipFruit = () => { gameData.isEquipped = true; updateUI(); save(); };
        function log(t) { const m=document.getElementById('msg'); m.innerText=t; setTimeout(()=>m.innerText="", 2000); }
    </script>
</body>
    </html>
